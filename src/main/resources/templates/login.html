<!--가게 로그인-->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Sweet Pickup</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            padding: 50px 40px;
            background: #f5f3f0;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 36px;
            font-weight: 700;
            color: #2d2d2d;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            font-size: 16px;
            color: #9e9e9e;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 50px;
        }

        .btn {
            flex: 1;
            padding: 16px 24px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #8b5a3c;
            color: white;
        }

        .btn-primary:hover {
            background: #6d4a31;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 90, 60, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #8b5a3c;
            border: 2px solid #8b5a3c;
        }

        .btn-secondary:hover {
            background: #f9f6f3;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #5a4a42;
            font-weight: 500;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0dcd8;
            border-radius: 12px;
            font-size: 15px;
            background: white;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #8b5a3c;
            box-shadow: 0 0 0 3px rgba(139, 90, 60, 0.1);
        }

        .error-message {
            background: #ffe6e6;
            color: #d63031;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 14px;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #8b5a3c;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: #6d4a31;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(139, 90, 60, 0.3);
        }

        .features {
            display: flex;
            justify-content: space-around;
            margin-top: 50px;
            padding-top: 40px;
            border-top: 1px solid #e0dcd8;
        }

        .feature-item {
            text-align: center;
        }

        .feature-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .feature-text {
            font-size: 13px;
            color: #6d5d53;
            font-weight: 500;
        }

        .back-home {
            margin-top: 20px;
        }

        .back-home a {
            color: #8b7d74;
            text-decoration: none;
            font-size: 14px;
        }

        .back-home a:hover {
            color: #8b5a3c;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">🍰</div>
    <h1 class="login-title">Sweet Pickup</h1>
    <p class="login-subtitle">달콤한 순간을 더 특별하게</p>




    <!-- 로그인 폼 -->
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label class="form-label" for="email">이메일</label>
            <input type="email" id="email" name="email" class="form-input"
                   placeholder="example@email.com" required>

        </div>
        <!-- 에러 메시지 -->
        <div class="error-message" th:if="${param.error}">
            존재하지 않는 이메일이거나 비밀번호가 틀렸습니다.
        </div>
        <div class="form-group">
            <label class="form-label" for="password">비밀번호</label>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit" class="btn-login">로그인</button>

        <div class="signup-link">
            계정이 없으신가요? <a th:href="@{/signup}">회원가입</a>
        </div>
    </form>

    <!-- 특징 섹션 -->
    <div class="features">
        <div class="feature-item">
            <div class="feature-icon">🎂</div>
            <div class="feature-text">매일 신선하게</div>
        </div>
        <div class="feature-item">
            <div class="feature-icon">⏰</div>
            <div class="feature-text">편리한 예약</div>
        </div>
        <div class="feature-item">
            <div class="feature-icon">✨</div>
            <div class="feature-text">다양한 선택</div>
        </div>
    </div>

    <!-- 홈으로 -->
    <div class="back-home">
        <a th:href="@{/}">← 홈으로 돌아가기</a>
    </div>
</div>

<script>
    // 디저트 둘러보기 버튼
    document.querySelector('.btn-primary').addEventListener('click', function() {
        window.location.href = '/desserts';
    });

    // 로그인 버튼
    document.querySelector('.btn-secondary').addEventListener('click', function() {
        window.location.href = '/signup';
    });
</script>
</body>
</html>
