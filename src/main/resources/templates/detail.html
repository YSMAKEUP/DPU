<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${store.storeName} + ' - Sweet Pickup'">가게 상세 - Sweet Pickup</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      z-index: 0;
    }
    body::before { width: 600px; height: 600px; top: -200px; right: -200px; }
    body::after  { width: 500px; height: 500px; bottom: -150px; left: -150px; }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    /* 뒤로가기 */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: rgba(255,255,255,0.8);
      color: #8b5a3c;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 24px;
      transition: all 0.3s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .back-btn:hover {
      background: white;
      transform: translateX(-4px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      color: #6d4a31;
    }

    /* 가게 헤더 카드 */
    .store-header-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 36px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      margin-bottom: 24px;
    }

    .store-header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 24px;
    }

    .store-name {
      font-size: 32px;
      font-weight: 800;
      color: #2d2d2d;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .status-open  { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: #155724; box-shadow: 0 2px 8px rgba(21,87,36,0.15); }
    .status-closed { background: linear-gradient(135deg, #f8d7da, #f5c6cb); color: #721c24; box-shadow: 0 2px 8px rgba(114,28,36,0.15); }

    .store-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      background: #faf8f6;
      border-radius: 14px;
      font-size: 14px;
      color: #5a4a42;
    }
    .info-item i {
      color: #8b5a3c;
      width: 18px;
      font-size: 15px;
      flex-shrink: 0;
    }

    /* 지도 */
    .map-card {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      margin-bottom: 24px;
      height: 280px;
    }
    #map { width: 100%; height: 100%; }

    /* 상품 섹션 */
    .products-section {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .section-title {
      font-size: 22px;
      font-weight: 700;
      color: #2d2d2d;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title i { color: #8b5a3c; }

    .product-count {
      font-size: 14px;
      color: #8b5a3c;
      font-weight: 600;
      background: #faf0e8;
      padding: 4px 12px;
      border-radius: 20px;
      margin-left: auto;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .product-card {
      border: 2px solid #f0ebe6;
      border-radius: 18px;
      padding: 22px;
      transition: all 0.3s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      background: white;
    }
    .product-card:hover {
      border-color: #8b5a3c;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(139,90,60,0.15);
    }

    .product-icon {
      font-size: 36px;
      margin-bottom: 12px;
    }

    .product-name {
      font-size: 16px;
      font-weight: 700;
      color: #2d2d2d;
      margin-bottom: 8px;
    }

    .product-price {
      font-size: 18px;
      font-weight: 800;
      color: #8b5a3c;
      margin-bottom: 12px;
    }

    .product-stock {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .stock-ok     { background: #d4edda; color: #155724; }
    .stock-low    { background: #fff3cd; color: #856404; }
    .stock-out    { background: #f8d7da; color: #721c24; }

    .empty-products {
      text-align: center;
      padding: 60px 20px;
      color: #9e9e9e;
    }
    .empty-products i { font-size: 48px; margin-bottom: 16px; display: block; color: #c4bdb8; }

    @media (max-width: 768px) {
      .store-header-top { flex-direction: column; }
      .store-name { font-size: 26px; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .store-header-card, .products-section { padding: 24px 20px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- 뒤로가기 -->
  <a href="/stores/list" class="back-btn">
    <i class="fas fa-arrow-left"></i> 목록으로 돌아가기
  </a>

  <!-- 가게 헤더 -->
  <div class="store-header-card">
    <div class="store-header-top">
      <div>
        <div class="store-name" th:text="${store.storeName}">가게 이름</div>
      </div>
      <span th:if="${store.isOpen}" class="status-badge status-open">
        <i class="fas fa-check-circle"></i> 영업중
      </span>
      <span th:unless="${store.isOpen}" class="status-badge status-closed">
        <i class="fas fa-times-circle"></i> 휴무
      </span>
    </div>

    <div class="store-info-grid">
      <div class="info-item">
        <i class="fas fa-map-marker-alt"></i>
        <span th:text="${store.address}">주소</span>
      </div>
      <div class="info-item" th:if="${store.openTime != null and store.closeTime != null}">
        <i class="fas fa-clock"></i>
        <span th:text="${store.openTime} + ' ~ ' + ${store.closeTime}">영업시간</span>
      </div>
      <div class="info-item" th:if="${store.closedDay != null}">
        <i class="fas fa-calendar-times"></i>
        정기휴무:
        <span th:switch="${store.closedDay}">
          <span th:case="1">월요일</span>
          <span th:case="2">화요일</span>
          <span th:case="3">수요일</span>
          <span th:case="4">목요일</span>
          <span th:case="5">금요일</span>
          <span th:case="6">토요일</span>
          <span th:case="7">일요일</span>
        </span>
      </div>
    </div>
  </div>

  <!-- 지도 -->
  <div class="map-card">
    <div id="map"></div>
  </div>

  <!-- 상품 목록 -->
  <div class="products-section">
    <h2 class="section-title">
      <i class="fas fa-cookie-bite"></i>
      판매 상품
      <span class="product-count" th:text="${store.products.size()} + '개'">0개</span>
    </h2>

    <!-- 상품 있을 때 -->
    <div th:if="${store.products != null and !store.products.isEmpty()}" class="products-grid">
      <a th:each="product : ${store.products}"
         th:href="@{/products/{id}(id=${product.productId})}"
         class="product-card">
        <div class="product-icon">🍰</div>
        <div class="product-name" th:text="${product.name}">상품명</div>
        <div class="product-price" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'">가격</div>

        <!-- 재고 상태 -->
        <span th:if="${product.soldOut}" class="product-stock stock-out">
          <i class="fas fa-times-circle"></i> 품절
        </span>
        <span th:if="${!product.soldOut and product.stockQty <= 10 and product.stockQty > 0}"
              class="product-stock stock-low">
          <i class="fas fa-exclamation-triangle"></i> 품절임박 (<span th:text="${product.stockQty}"></span>개)
        </span>
        <span th:if="${!product.soldOut and product.stockQty > 10}"
              class="product-stock stock-ok">
          <i class="fas fa-check-circle"></i> 재고 충분
        </span>
      </a>
    </div>

    <!-- 상품 없을 때 -->
    <div th:if="${store.products == null or store.products.isEmpty()}" class="empty-products">
      <i class="fas fa-box-open"></i>
      <p>등록된 상품이 없습니다</p>
    </div>
  </div>

</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=30b3dfc1e244b48dfa1c16cec788c438"></script>
<script th:inline="javascript">
  window.addEventListener('DOMContentLoaded', function () {
    const lat = /*[[${store.latitude}]]*/ 37.5665;
    const lng = /*[[${store.longitude}]]*/ 126.9780;
    const name = /*[[${store.storeName}]]*/ '가게';
    const address = /*[[${store.address}]]*/ '';

    const mapContainer = document.getElementById('map');
    const mapOption = {
      center: new kakao.maps.LatLng(lat, lng),
      level: 4
    };
    const map = new kakao.maps.Map(mapContainer, mapOption);

    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(lat, lng),
      map: map
    });

    const infowindow = new kakao.maps.InfoWindow({
      content: `
        <div style="padding:12px 18px; min-width:180px;">
          <div style="font-weight:bold; color:#8b5a3c; font-size:14px; margin-bottom:6px;">🍰 ${name}</div>
          <div style="font-size:12px; color:#666;">${address}</div>
        </div>
      `
    });
    infowindow.open(map, marker);
  });
</script>
</body>
</html>
