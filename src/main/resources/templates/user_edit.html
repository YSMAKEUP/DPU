<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원정보 수정</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #faf9f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 16px;
      color: #2c1f14;
    }

    /* Top nav link */
    .nav-link {
      align-self: flex-start;
      margin-bottom: 48px;
      color: #6b4226;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
    }
    .nav-link:hover { text-decoration: underline; }

    /* Page heading */
    .page-title {
      font-size: 28px;
      font-weight: 700;
      color: #2c1f14;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-block;
      background-color: #7b4f2e;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      border-radius: 20px;
      padding: 4px 16px;
      margin-bottom: 36px;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 36px 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 17px;
      font-weight: 700;
      color: #2c1f14;
      margin-bottom: 28px;
    }

    /* Messages */
    .msg-success {
      background: #edf7ed;
      color: #2e7d32;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-size: 14px;
    }
    .msg-error {
      background: #fdecea;
      color: #c62828;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 18px;
      font-size: 14px;
    }

    /* Form rows */
    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0;
      border-bottom: 1px solid #ede8e2;
    }
    .form-row:last-of-type { border-bottom: none; }

    .form-row label {
      font-size: 14px;
      color: #8c7b6b;
      font-weight: 400;
      min-width: 80px;
    }

    .form-row input {
      flex: 1;
      text-align: right;
      border: none;
      background: transparent;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: #2c1f14;
      outline: none;
    }
    .form-row input::placeholder {
      color: #c5b8aa;
      font-weight: 400;
    }
    .form-row input:focus {
      color: #7b4f2e;
    }

    /* Divider section */
    .divider-section {
      margin-top: 28px;
      margin-bottom: 8px;
    }

    .divider-label {
      font-size: 13px;
      color: #8c7b6b;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ede8e2;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 560px;
      margin-bottom: 12px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.88; }
    .btn:active { opacity: 0.75; }

    .btn-primary {
      background-color: #7b4f2e;
      color: #fff;
    }

    .btn-secondary {
      background-color: #f0ebe4;
      color: #2c1f14;
      border: 1px solid #ddd4c8;
    }

    /* Bottom row */
    .bottom-row {
      display: flex;
      align-items: center;
      width: 100%;
      max-width: 560px;
      gap: 12px;
    }

    .btn-home {
      flex: 1;
      padding: 16px;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      background: #f0ebe4;
      color: #2c1f14;
      border: 1px solid #ddd4c8;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s;
    }
    .btn-home:hover { opacity: 0.88; }

    .btn-withdraw {
      padding: 10px 16px;
      border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: #fff;
      color: #888;
      border: 1px solid #ddd;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-withdraw:hover { opacity: 0.75; }
  </style>
</head>
<body>

<a class="nav-link" th:href="@{/}">Sweet Pickup</a>

<div class="page-title" th:text="${userForm.name + '님'}">송기윤님</div>
<span class="badge">일반 회원</span>

<div class="card">
  <div class="card-title">회원정보 수정</div>

  <div th:if="${msg}" class="msg-success" th:text="${msg}"></div>
  <div th:if="${error}" class="msg-error" th:text="${error}"></div>

  <form th:action="@{/user_edit}" th:object="${userForm}" method="post" id="editForm">
    <div class="form-row">
      <label>이름</label>
      <input type="text" th:field="*{name}" placeholder="이름을 입력하세요" required />
    </div>
    <div class="form-row">
      <label>이메일</label>
      <input type="email" th:field="*{email}" placeholder="이메일을 입력하세요" required />
    </div>

    <div class="divider-section">
      <div class="divider-label">비밀번호 변경 시에만 입력하세요</div>
      <div class="form-row">
        <label>새 비밀번호</label>
        <input type="password" th:field="*{newPassword}" placeholder="새 비밀번호" />
      </div>
      <div class="form-row">
        <label>비밀번호 확인</label>
        <input type="password" th:field="*{confirmPassword}" placeholder="비밀번호 확인" />
      </div>
    </div>
  </form>
</div>

<div class="btn-group">
  <button class="btn btn-primary" type="submit" form="editForm">수정하기</button>
  <a th:href="@{/my_reservations}" class="btn btn-secondary" style="text-align:center; text-decoration:none; display:flex; align-items:center; justify-content:center;">내 예약 보기</a>
</div>

<div class="bottom-row">
  <a th:href="@{/}" class="btn-home">홈으로</a>
  <button class="btn-withdraw" th:onclick="|location.href='@{/user_delete}'|" type="button">회원탈퇴</button>
</div>

</body>
</html>
