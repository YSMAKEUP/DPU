<!--회원가입-->

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Sweet Pickup</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Apple SD Gothic Neo', sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #e8d5c4 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 배경 원형 장식 */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            z-index: 0;
        }

        body::before {
            width: 500px;
            height: 500px;
            top: -150px;
            right: -150px;
        }

        body::after {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
        }

        .signup-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            padding: 50px 40px;
            background: rgba(245, 243, 240, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        .logo {
            text-align: center;
            font-size: 56px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .signup-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: #2d2d2d;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .signup-subtitle {
            text-align: center;
            font-size: 15px;
            color: #9e9e9e;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #5a4a42;
            font-weight: 500;
            font-size: 14px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0dcd8;
            border-radius: 12px;
            font-size: 15px;
            background: white;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #8b5a3c;
            box-shadow: 0 0 0 4px rgba(139, 90, 60, 0.1);
        }

        .form-input::placeholder {
            color: #c4bdb8;
        }

        .password-hint {
            font-size: 12px;
            color: #8b7d74;
            margin-top: 6px;
            padding-left: 4px;
        }

        .role-group {
            display: flex;
            gap: 15px;
            margin-top: 8px;
        }

        .role-option {
            flex: 1;
            position: relative;
        }

        .role-option input[type="radio"] {
            display: none;
        }

        .role-label {
            display: block;
            padding: 20px 15px;
            border: 2px solid #e0dcd8;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .role-option input[type="radio"]:checked + .role-label {
            border-color: #8b5a3c;
            background: linear-gradient(135deg, #fff9f5 0%, #faf6f0 100%);
            color: #8b5a3c;
            font-weight: 600;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 90, 60, 0.15);
        }

        .role-label:hover {
            border-color: #8b5a3c;
            transform: translateY(-2px);
        }

        .role-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .role-text {
            font-size: 14px;
            font-weight: 500;
        }

        .btn-signup {
            width: 100%;
            padding: 16px;
            background: #8b5a3c;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(139, 90, 60, 0.2);
        }

        .btn-signup:hover {
            background: #6d4a31;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 90, 60, 0.3);
        }

        .btn-signup:active {
            transform: translateY(0);
        }

        .divider {
            margin: 30px 0;
            text-align: center;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #e0dcd8;
        }

        .divider span {
            background: rgba(245, 243, 240, 0.95);
            padding: 0 16px;
            color: #9e9e9e;
            font-size: 13px;
            position: relative;
            z-index: 1;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #6d5d53;
            font-size: 14px;
        }

        .login-link a {
            color: #8b5a3c;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: #6d4a31;
            text-decoration: underline;
        }

        /* 반응형 */
        @media (max-width: 480px) {
            body {
                padding: 20px 15px;
            }

            .signup-container {
                padding: 40px 30px;
            }

            .signup-title {
                font-size: 28px;
            }

            .logo {
                font-size: 48px;
            }

            .role-group {
                flex-direction: column;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
<div class="signup-container">
    <div class="logo">🍰</div>
    <h1 class="signup-title">회원가입</h1>
    <p class="signup-subtitle">Sweet Pickup과 함께 시작하세요</p>

    <!-- 회원가입 폼 -->
    <form th:action="@{/signup}" method="post">
        <!-- 이름 -->
        <div class="form-group">
            <label class="form-label" for="name">이름</label>
            <input type="text" id="name" name="name" class="form-input"
                   placeholder="홍길동" required>
        </div>

        <!-- 이메일 -->
        <div class="form-group">
            <label class="form-label" for="email">이메일</label>
            <input type="email" id="email" name="email" class="form-input"
                   placeholder="example@email.com" required>
        </div>

        <!-- 비밀번호 -->
        <div class="form-group">
            <label class="form-label" for="password">비밀번호</label>
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="비밀번호를 입력하세요" required minlength="6">
            <p class="password-hint">* 6자 이상 입력해주세요</p>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="form-group">
            <label class="form-label" for="passwordConfirm">비밀번호 확인</label>
            <input type="password" id="passwordConfirm" name="passwordConfirm" class="form-input"
                   placeholder="비밀번호를 다시 입력하세요" required minlength="6">
        </div>

        <!-- 역할 선택 -->
        <div class="form-group">
            <label class="form-label">가입 유형</label>
            <div class="role-group">
                <div class="role-option">
                    <input type="radio" id="user" name="role" value="USER" checked>
                    <label for="user" class="role-label">
                        <div class="role-icon">🍰</div>
                        <div class="role-text">일반 회원</div>
                    </label>
                </div>
                <div class="role-option">
                    <input type="radio" id="owner" name="role" value="OWNER">
                    <label for="owner" class="role-label">
                        <div class="role-icon">🏪</div>
                        <div class="role-text">사장님</div>
                    </label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn-signup">가입하기</button>
    </form>

    <!-- 구분선 -->
    <div class="divider">
        <span>또는</span>
    </div>

    <!-- 로그인 링크 -->
    <div class="login-link">
        이미 계정이 있으신가요? <a th:href="@{/login}">로그인</a>
    </div>
</div>

<script>
    // 비밀번호 확인 검증
    document.querySelector('form').addEventListener('submit', function(e) {
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;

        if (password !== passwordConfirm) {
            e.preventDefault();
            alert('비밀번호가 일치하지 않습니다.');

            // 비밀번호 확인 필드에 포커스
            document.getElementById('passwordConfirm').focus();
        }
    });
</script>
</body>
</html>
