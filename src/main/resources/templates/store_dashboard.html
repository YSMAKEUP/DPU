<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 매장 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0ebe3;
            --card-bg: #ffffff;
            --brown-dark: #4a3728;
            --brown-mid: #7c5c44;
            --brown-light: #b08d72;
            --accent: #c8793a;
            --border: #e2d8cf;
            --input-bg: #faf7f4;
            --text-main: #2d2318;
            --text-sub: #8a7060;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            min-height: 100vh;
            padding: 48px 16px;
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--text-main);
        }

        .page-title {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--brown-dark);
            text-align: center;
            margin-bottom: 32px;
        }

        .main-container {
            max-width: 700px;
            margin: 0 auto;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        .menu-card {
            background: var(--card-bg);
            border: 1.5px solid var(--border);
            border-radius: 16px;
            padding: 28px 16px;
            text-align: center;
            text-decoration: none;
            color: var(--brown-dark);
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
            cursor: pointer;
        }

        .menu-card:hover {
            border-color: var(--brown-light);
            box-shadow: 0 4px 16px rgba(80, 50, 20, 0.12);
            transform: translateY(-2px);
            color: var(--brown-dark);
        }

        .menu-card i {
            font-size: 1.8rem;
            color: var(--accent);
            margin-bottom: 12px;
            display: block;
        }

        .menu-card span {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .section-box {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(80, 50, 20, 0.08);
        }

        .section-title {
            font-family: 'Noto Serif KR', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--brown-dark);
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1.5px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        thead th {
            color: var(--text-sub);
            font-weight: 600;
            padding: 8px 12px;
            border-bottom: 1.5px solid var(--border);
            text-align: left;
        }

        tbody td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
        }

        .badge-sale {
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .badge-soldout {
            background: #fce4e4;
            color: #c0392b;
            border-radius: 20px;
            padding: 3px 10px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .btn-edit {
            background: var(--brown-dark);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 5px 14px;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.15s;
        }

        .btn-edit:hover {
            background: var(--brown-mid);
            color: #fff;
        }

        .empty-state {
            text-align: center;
            padding: 32px 0;
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        .home-link {
            text-align: center;
            margin-top: 24px;
        }

        .home-link a {
            color: var(--brown-mid);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .home-link a:hover {
            color: var(--brown-dark);
        }

        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: repeat(2, 1fr); }
            .page-title { font-size: 1.5rem; }
            .section-box { padding: 18px; }
        }
    </style>
</head>
<body>
<div class="main-container">

    <h1 class="page-title" th:text="${store.name}">매장 이름</h1>

    <!-- 메뉴 -->
    <div class="menu-grid">
        <a th:href="@{/stores/new}" class="menu-card">
            <i class="fa-solid fa-store"></i>
            <span>매장 등록</span>
        </a>
        <a th:href="@{/products/new}" class="menu-card">
            <i class="fa-solid fa-plus"></i>
            <span>상품 등록</span>
        </a>
        <a th:href="@{/stores/{id}/products(id=${store.id})}" class="menu-card">
            <i class="fa-solid fa-box-open"></i>
            <span>상품 관리</span>
        </a>
    </div>

    <!-- 상품 목록 -->
    <div class="section-box">
        <div class="section-title">상품 목록</div>

        <div class="empty-state" th:if="${store.products.size() == 0}">
            등록된 상품이 없습니다
        </div>

        <table th:if="${store.products.size() > 0}">
            <thead>
            <tr>
                <th>상품명</th>
                <th>가격</th>
                <th>재고</th>
                <th>상태</th>
                <th>관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${store.products}">
                <td th:text="${product.name}"></td>
                <td th:text="${#numbers.formatInteger(product.price, 0, 'COMMA')} + '원'"></td>
                <td th:text="${product.stockQuantity}"></td>
                <td>
                    <span th:if="${product.soldOut}" class="badge-soldout">품절</span>
                    <span th:unless="${product.soldOut}" class="badge-sale">판매중</span>
                </td>
                <td>
                    <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn-edit">수정</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 홈으로 -->
    <div class="home-link">
        <a href="/">← 홈으로 돌아가기</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
