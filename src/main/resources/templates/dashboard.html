<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 매장 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 th:text="${store.name}">매장 이름</h2>

    <a th:href="@{/Store_new}" class="btn btn-primary mt-3">+ 상품 등록</a>

    <hr>

    <h4 class="mt-4">상품 목록</h4>
    <table class="table mt-3">
        <thead>
        <tr>
            <th>상품명</th>
            <th>가격</th>
            <th>재고</th>
            <th>상태</th>
            <th>관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${store.products}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.price} + '원'"></td>
            <td th:text="${product.stockQuantity}"></td>
            <td th:text="${product.soldOut} ? '품절' : '판매중'"></td>
            <td>
                <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-sm btn-warning">수정</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
