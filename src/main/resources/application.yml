spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL # 메모리에서 실행하며 MySQL 모드로 동작
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트 시작 시 테이블 생성, 종료 시 삭제
    show-sql: true
    properties:
      hibernate:
        format_sql: true